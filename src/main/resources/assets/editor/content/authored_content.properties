authoredDialogue.0.node.1.bodyText=Go to the nearby shoal and catch me a fish. I recommend you catch as much as you can\! you were lucky to have awoken near so much food, it tends to be rare within the walls. Bring it back when you are done. Oh and do not go past that door, that opening, it looks like it might lock behind you\!

authoredDialogue.0.node.7.bodyText=Did you get lucky with butchering one? Ahhh it doesn't matter here take this extra one I had, as a risen you have a unique constitution you can attempt to incorporate these parts into yourself. I recommend you try, because as you are now I don't think you will be able to last much longer.

dialogue.2.node.2.bodyText=There is one thing, though I would not normally trust it to an outsider.\nThe old catacombs lie east of Raim. A kobold wizard has made its den somewhere below and has begun creeping close to the village after nightfall.\nGo down there, kill it, and bring me its bones. I want proof that it will not return wearing some new shape beneath the Flesh Moon.
dialogue.2.node.2.choice.count=0
dialogue.2.node.2.nodeId=catacomb_task
dialogue.2.node.3.bodyText=The entrance is east of the village. Kill the kobold wizard and bring me its bones.
dialogue.2.node.3.choice.count=0
dialogue.2.node.3.nodeId=reminder
dialogue.2.node.4.bodyText=These are its bones. Good. Whatever foul workings it practiced beneath Raim have ended with it.\nYou have done this village a service, stranger.

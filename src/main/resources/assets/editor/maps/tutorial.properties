authoredDialogue.0.node.3.bodyText=*Munch Munch* oh that hit the spot. Good, make sure to grab yourself some if there are still some in that spot. Next lets try some mining, in the next room there is a few rocks I will meet you over there\! Get some of the rocks and then come back\!

authoredDialogue.0.node.2.bodyText=Alright good, well first lesson, when you see one of those shoals, you should get what you can, you never know when you'll be able to get another source of food down here. Next, you need to make it edible, "Use" the fish on the campfire next to me, and try to cook it.

authoredDialogue.0.node.6.bodyText=Good, listen I have some old gear I found on some of the other denizens, take this with you. In the next room there are a few Kobolds, be careful they might be dumb but sometimes they wise up a bit and call for backup. I will meet you over there, for now go and kill one\! And if you can try to butcher one.

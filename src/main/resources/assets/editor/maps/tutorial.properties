authoredDialogue.0.node.7.bodyText=Did you get lucky with butchering one? Ahhh it doesn't matter here take this extra one I had, as a risen you have a unique constitution you can attempt to incorporate these parts into yourself. I recommend you try, because as you are now I don't think you will be able to last much longer.\nAh one more thing, when you are ready, exit through that door on the far end of the room. We might see each other again down here, but in the case we don't it was nice meeting with another who has their sanity intact.
